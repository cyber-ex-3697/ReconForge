# =============================================================================
# ReconForge - Ansible Inventory
# =============================================================================

# -----------------------------------------------------------------------------
# Production Environment
# -----------------------------------------------------------------------------
[production]
prod-server-1 ansible_host=192.168.1.10 ansible_user=root
prod-server-2 ansible_host=192.168.1.11 ansible_user=root

# -----------------------------------------------------------------------------
# Staging Environment
# -----------------------------------------------------------------------------
[staging]
staging-server-1 ansible_host=10.0.0.10 ansible_user=ubuntu
staging-server-2 ansible_host=10.0.0.11 ansible_user=ubuntu

# -----------------------------------------------------------------------------
# Development Environment
# -----------------------------------------------------------------------------
[development]
dev-server-1 ansible_host=localhost ansible_user=root

# -----------------------------------------------------------------------------
# Kubernetes Cluster
# -----------------------------------------------------------------------------
[k8s-masters]
k8s-master-1 ansible_host=192.168.2.10 ansible_user=root

[k8s-workers]
k8s-worker-1 ansible_host=192.168.2.20 ansible_user=root
k8s-worker-2 ansible_host=192.168.2.21 ansible_user=root

# -----------------------------------------------------------------------------
# Cloud Environments
# -----------------------------------------------------------------------------
[aws]
aws-instance-1 ansible_host=54.123.45.67 ansible_user=ubuntu

[gcp]
gcp-instance-1 ansible_host=34.56.78.90 ansible_user=ubuntu

[azure]
azure-instance-1 ansible_host=20.123.45.67 ansible_user=azureuser

# -----------------------------------------------------------------------------
# Group Variables
# -----------------------------------------------------------------------------
[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

[production:vars]
reconforge_version=4.0.0
deep_scan=true
threads=100

[staging:vars]
reconforge_version=latest
deep_scan=false
threads=50

[development:vars]
reconforge_version=dev
deep_scan=false
threads=10

# -----------------------------------------------------------------------------
# Tag-Based Groups
# -----------------------------------------------------------------------------
[scan-targets]
google.com ansible_host=google.com
github.com ansible_host=github.com
cloudflare.com ansible_host=cloudflare.com

[scan-targets:vars]
deep_scan=true
threads=50

# -----------------------------------------------------------------------------
# Inventory Groups with Custom Variables
# -----------------------------------------------------------------------------
[high_priority_scans]
scan-target-1 ansible_host=example.com threads=200
scan-target-2 ansible_host=test.com deep_scan=true

[low_priority_scans]
scan-target-3 ansible_host=sample.org threads=10
scan-target-4 ansible_host=demo.net deep_scan=false

# -----------------------------------------------------------------------------
# Children Groups
# -----------------------------------------------------------------------------
[all_scans:children]
high_priority_scans
low_priority_scans

[all_servers:children]
production
staging
development

# -----------------------------------------------------------------------------
# Connection Settings
# -----------------------------------------------------------------------------
[all:vars]
ansible_connection=ssh
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_user=root
