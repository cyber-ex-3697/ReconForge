# =============================================================================
# ReconForge - Ansible Playbook
# =============================================================================
---
- name: ReconForge Deployment Playbook
  hosts: all
  become: yes
  vars:
    reconforge_version: "4.0.0"
    install_dir: "/opt/reconforge"
    output_dir: "/var/lib/reconforge/output"
    user: reconforge
    group: reconforge

  tasks:
    # ========================================================================
    # System Preparation
    # ========================================================================
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - curl
          - wget
          - git
          - golang-go
          - nmap
          - jq
          - parallel
          - unzip
        state: present

    - name: Create reconforge user
      user:
        name: "{{ user }}"
        group: "{{ group }}"
        system: yes
        create_home: yes
        home: "{{ install_dir }}"

    # ========================================================================
    # Directory Setup
    # ========================================================================
    - name: Create installation directory
      file:
        path: "{{ install_dir }}"
        state: directory
        owner: "{{ user }}"
        group: "{{ group }}"
        mode: 0755

    - name: Create output directory
      file:
        path: "{{ output_dir }}"
        state: directory
        owner: "{{ user }}"
        group: "{{ group }}"
        mode: 0755

    - name: Create logs directory
      file:
        path: "{{ install_dir }}/logs"
        state: directory
        owner: "{{ user }}"
        group: "{{ group }}"
        mode: 0755

    # ========================================================================
    # Clone and Build ReconForge
    # ========================================================================
    - name: Clone ReconForge repository
      git:
        repo: https://github.com/reconforge/reconforge.git
        dest: "{{ install_dir }}/source"
        version: "{{ reconforge_version }}"
      become_user: "{{ user }}"

    - name: Build ReconForge binary
      command:
        cmd: go build -o reconforge cmd/reconforge/main.go
        chdir: "{{ install_dir }}/source"
      become_user: "{{ user }}"
      environment:
        PATH: "{{ ansible_env.PATH }}:/usr/local/go/bin"
        GOPATH: "/home/{{ user }}/go"

    - name: Copy binary to /usr/local/bin
      copy:
        src: "{{ install_dir }}/source/reconforge"
        dest: /usr/local/bin/reconforge
        mode: 0755
        remote_src: yes

    # ========================================================================
    # Install Go Tools
    # ========================================================================
    - name: Install subfinder
      shell: |
        go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
      become_user: "{{ user }}"
      environment:
        PATH: "{{ ansible_env.PATH }}:/usr/local/go/bin"
        GOPATH: "/home/{{ user }}/go"

    - name: Install httpx
      shell: |
        go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest
      become_user: "{{ user }}"
      environment:
        PATH: "{{ ansible_env.PATH }}:/usr/local/go/bin"
        GOPATH: "/home/{{ user }}/go"

    - name: Install nuclei
      shell: |
        go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
      become_user: "{{ user }}"
      environment:
        PATH: "{{ ansible_env.PATH }}:/usr/local/go/bin"
        GOPATH: "/home/{{ user }}/go"

    - name: Copy Go binaries to system path
      copy:
        src: "/home/{{ user }}/go/bin/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: 0755
        remote_src: yes
      loop:
        - subfinder
        - httpx
        - nuclei

    # ========================================================================
    # Configuration
    # ========================================================================
    - name: Create config directory
      file:
        path: "/home/{{ user }}/.config/reconforge"
        state: directory
        owner: "{{ user }}"
        group: "{{ group }}"
        mode: 0755

    - name: Deploy configuration file
      template:
        src: config.yaml.j2
        dest: "/home/{{ user }}/.config/reconforge/config.yaml"
        owner: "{{ user }}"
        group: "{{ group }}"
        mode: 0644

    # ========================================================================
    # Systemd Service
    # ========================================================================
    - name: Create systemd service file
      template:
        src: reconforge.service.j2
        dest: /etc/systemd/system/reconforge.service
        mode: 0644

    - name: Enable and start reconforge service
      systemd:
        name: reconforge
        enabled: yes
        state: started
        daemon_reload: yes

    # ========================================================================
    # Cron Job for Scheduled Scans
    # ========================================================================
    - name: Add cron job for daily scans
      cron:
        name: "ReconForge daily scan"
        minute: "0"
        hour: "2"
        job: "/usr/local/bin/reconforge -t example.com --deep -o /var/lib/reconforge/output/daily_$(date +\\%Y\\%m\\%d)"
        user: "{{ user }}"

    # ========================================================================
    # Firewall Configuration
    # ========================================================================
    - name: Allow HTTP/HTTPS outbound
      ufw:
        rule: allow
        direction: out
        port: "{{ item }}"
        proto: tcp
      loop:
        - 80
        - 443

    # ========================================================================
    # Monitoring Setup
    # ========================================================================
    - name: Install Prometheus node exporter
      apt:
        name: prometheus-node-exporter
        state: present

    - name: Enable node exporter
      systemd:
        name: prometheus-node-exporter
        enabled: yes
        state: started

  handlers:
    - name: restart reconforge
      systemd:
        name: reconforge
        state: restarted
        daemon_reload: yes
