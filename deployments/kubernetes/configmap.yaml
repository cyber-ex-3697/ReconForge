# =============================================================================
# ReconForge - Kubernetes ConfigMap
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: reconforge-config
  namespace: reconforge
  labels:
    app: reconforge
data:
  config.yaml: |
    version: "4.0.0"
    
    scan:
      profile: standard
      threads: 50
      deep_mode: true
      timeout: 30
      retries: 3
      rate_limit: 10
    
    rate:
      default: 50
      aggressive: 100
      stealth: 10
    
    tools:
      subfinder_version: "2.14.0"
      nuclei_version: "3.1.0"
      httpx_version: "1.3.8"
      wordlists:
        - "/app/wordlists/subdomains.txt"
      resolvers:
        - "1.1.1.1"
        - "8.8.8.8"
    
    output:
      directory: "/app/output"
      json: true
      html: true
      markdown: true
      screenshots: true
    
    logging:
      level: "info"
      format: "json"
      file: true
      file_path: "/app/logs/reconforge.log"

---
# =============================================================================
# ConfigMap for Scan Targets
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: reconforge-targets
  namespace: reconforge
data:
  targets.txt: |
    example.com
    google.com
    github.com
    cloudflare.com

---
# =============================================================================
# ConfigMap for Wordlists
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: reconforge-wordlists
  namespace: reconforge
data:
