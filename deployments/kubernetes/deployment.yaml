# =============================================================================
# ReconForge - Kubernetes Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reconforge
  namespace: reconforge
  labels:
    app: reconforge
    version: v4.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reconforge
  template:
    metadata:
      labels:
        app: reconforge
        version: v4.0
    spec:
      containers:
      - name: reconforge
        image: reconforge/reconforge:latest
        imagePullPolicy: Always
        args:
        - "-t"
        - "$(TARGET)"
        - "--deep"
        env:
        - name: TARGET
          valueFrom:
            configMapKeyRef:
              name: reconforge-config
              key: target
        - name: CHAOS_KEY
          valueFrom:
            secretKeyRef:
              name: reconforge-secrets
              key: chaos_key
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: reconforge-secrets
              key: github_token
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2"
        volumeMounts:
        - name: output
          mountPath: /app/output
        - name: config
          mountPath: /app/config.yaml
          subPath: config.yaml
      volumes:
      - name: output
        persistentVolumeClaim:
          claimName: reconforge-pvc
      - name: config
        configMap:
          name: reconforge-config
      restartPolicy: Always

---
# =============================================================================
# Persistent Volume Claim
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: reconforge-pvc
  namespace: reconforge
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
# =============================================================================
# Horizontal Pod Autoscaler
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: reconforge-hpa
  namespace: reconforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: reconforge
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
