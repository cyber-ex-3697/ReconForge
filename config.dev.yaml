version: "4.0.0"

scan:
  profile: stealth
  threads: 10
  deep_mode: false
  timeout: 10
  retries: 1
  rate_limit: 2

rate:
  default: 10
  aggressive: 20
  stealth: 2

api:
  chaos_key: ""
  github_token: ""
  shodan_key: ""
  censys_key: ""
  censys_secret: ""
  securitytrails_key: ""
  virustotal_key: ""

tools:
  subfinder_version: "2.14.0"
  nuclei_version: "3.1.0"
  httpx_version: "1.3.8"
  wordlists:
    - "/usr/share/wordlists/subdomains.txt"
  resolvers:
    - "1.1.1.1"
