# =============================================================================
# ReconForge - Docker Compose Example
# =============================================================================

version: '3.8'

services:
  # =========================================================================
  # Main ReconForge Service
  # =========================================================================
  reconforge:
    image: reconforge/reconforge:latest
    container_name: reconforge
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      # Mount output directory
      - ./output:/app/output
      # Mount custom configuration
      - ./config.yaml:/app/config.yaml:ro
      # Mount custom wordlists
      - ./wordlists:/app/wordlists:ro
    environment:
      - TARGET=${TARGET:-example.com}
      - DEEP_SCAN=${DEEP_SCAN:-false}
      - THREADS=${THREADS:-50}
      - CHAOS_KEY=${CHAOS_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - SHODAN_KEY=${SHODAN_KEY:-}
    command: -t ${TARGET} ${DEEP_SCAN:+-d} -T ${THREADS}
    restart: "no"
    network_mode: "host"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G

  # =========================================================================
  # Redis for Distributed Scans
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: reconforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # =========================================================================
  # PostgreSQL for Result Storage (Optional)
  # =========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: reconforge-postgres
    environment:
      - POSTGRES_USER=reconforge
      - POSTGRES_PASSWORD=reconforge
      - POSTGRES_DB=reconforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reconforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # =========================================================================
  # Nginx for Report Serving (Optional)
  # =========================================================================
  nginx:
    image: nginx:alpine
    container_name: reconforge-nginx
    ports:
      - "8080:80"
    volumes:
      - ./output:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - reconforge
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

# =============================================================================
# DISTRIBUTED SCANNING WITH MULTIPLE WORKERS
# =============================================================================
services:
  # Master node
  master:
    image: reconforge/reconforge:latest
    container_name: reconforge-master
    depends_on:
      - redis
    environment:
      - REDIS_ADDR=redis:6379
    command: -t example.com --deep --distributed --master
    volumes:
      - ./output-master:/app/output
    deploy:
      resources:
        limits:
          memory: 2G

  # Worker node 1
  worker1:
    image: reconforge/reconforge:latest
    container_name: reconforge-worker1
    depends_on:
      - redis
    environment:
      - REDIS_ADDR=redis:6379
    command: --worker
    volumes:
      - ./output-worker1:/app/output
    deploy:
      resources:
        limits:
          memory: 4G

  # Worker node 2
  worker2:
    image: reconforge/reconforge:latest
    container_name: reconforge-worker2
    depends_on:
      - redis
    environment:
      - REDIS_ADDR=redis:6379
    command: --worker
    volumes:
      - ./output-worker2:/app/output
    deploy:
      resources:
        limits:
          memory: 4G

  # Worker node 3
  worker3:
    image: reconforge/reconforge:latest
    container_name: reconforge-worker3
    depends_on:
      - redis
    environment:
      - REDIS_ADDR=redis:6379
    command: --worker
    volumes:
      - ./output-worker3:/app/output
    deploy:
      resources:
        limits:
          memory: 4G

# =============================================================================
# DEVELOPMENT ENVIRONMENT
# =============================================================================
services:
  dev:
    image: golang:1.21-alpine
    container_name: reconforge-dev
    working_dir: /app
    volumes:
      - ..:/app
      - go-mod-cache:/go/pkg/mod
    environment:
      - GOPROXY=https://proxy.golang.org,direct
      - GO111MODULE=on
    command: tail -f /dev/null
    deploy:
      resources:
        limits:
          memory: 2G

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  redis-data:
  postgres-data:
  go-mod-cache:

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  default:
    name: reconforge-network
    driver: bridge
