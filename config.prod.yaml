version: "4.0.0"

scan:
  profile: aggressive
  threads: 200
  deep_mode: true
  timeout: 60
  retries: 5
  rate_limit: 5

rate:
  default: 100
  aggressive: 200
  stealth: 5

api:
  chaos_key: "${CHAOS_KEY}"
  github_token: "${GITHUB_TOKEN}"
  shodan_key: "${SHODAN_KEY}"
  censys_key: "${CENSYS_KEY}"
  censys_secret: "${CENSYS_SECRET}"
  securitytrails_key: "${SECURITYTRAILS_KEY}"
  virustotal_key: "${VIRUSTOTAL_KEY}"

tools:
  subfinder_version: "2.14.0"
  nuclei_version: "3.1.0"
  httpx_version: "1.3.8"
  wordlists:
    - "/usr/share/wordlists/subdomains.txt"
    - "/usr/share/seclists/Discovery/DNS/subdomains-top1million-5000.txt"
  resolvers:
    - "1.1.1.1"
    - "8.8.8.8"
    - "9.9.9.9"
