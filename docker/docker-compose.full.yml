# =============================================================================
# ReconForge - Complete Enterprise Setup
# =============================================================================
# Purpose: Full stack including all services (distributed + graph + monitoring)
# =============================================================================

version: '3.8'

services:
  # -------------------------------------------------------------------------
  # Redis - Message Queue
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: reconforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 4gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reconforge-net
    deploy:
      resources:
        limits:
          memory: 2G

  # -------------------------------------------------------------------------
  # PostgreSQL - Relational Storage
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: reconforge-postgres
    environment:
      POSTGRES_USER: reconforge
      POSTGRES_PASSWORD: reconforge
      POSTGRES_DB: reconforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reconforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reconforge-net
    deploy:
      resources:
        limits:
          memory: 2G

  # -------------------------------------------------------------------------
  # Neo4j - Graph Database
  # -------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-enterprise
    container_name: reconforge-neo4j
    environment:
      NEO4J_AUTH: neo4j/reconforge123
      NEO4J_PLUGINS: '["graph-data-science", "apoc"]'
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - reconforge-net
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4'

  # -------------------------------------------------------------------------
  # Master Node
  # -------------------------------------------------------------------------
  master:
    build:
      context: ..
      dockerfile: docker/Dockerfile.master
    container_name: reconforge-master
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      POSTGRES_HOST: postgres
      POSTGRES_USER: reconforge
      POSTGRES_PASSWORD: reconforge
      POSTGRES_DB: reconforge
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: reconforge123
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - master-output:/app/output
      - master-logs:/app/logs
      - ../config.yaml:/app/config.yaml:ro
    command: --master --api --port=8080 --workers=10 --graph
    networks:
      - reconforge-net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'

  # -------------------------------------------------------------------------
  # Workers
  # -------------------------------------------------------------------------
  worker1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: reconforge-worker1
    depends_on:
      redis:
        condition: service_healthy
    environment:
      WORKER_ID: worker-1
      REDIS_ADDR: redis:6379
    volumes:
      - worker1-output:/app/output
      - worker1-logs:/app/logs
      - ../config.yaml:/app/config.yaml:ro
    command: --worker --queue=redis
    networks:
      - reconforge-net
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4'

  worker2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: reconforge-worker2
    depends_on:
      redis:
        condition: service_healthy
    environment:
      WORKER_ID: worker-2
      REDIS_ADDR: redis:6379
    volumes:
      - worker2-output:/app/output
      - worker2-logs:/app/logs
      - ../config.yaml:/app/config.yaml:ro
    command: --worker --queue=redis
    networks:
      - reconforge-net
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4'

  worker3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: reconforge-worker3
    depends_on:
      redis:
        condition: service_healthy
    environment:
      WORKER_ID: worker-3
      REDIS_ADDR: redis:6379
    volumes:
      - worker3-output:/app/output
      - worker3-logs:/app/logs
      - ../config.yaml:/app/config.yaml:ro
    command: --worker --queue=redis
    networks:
      - reconforge-net
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4'

  # -------------------------------------------------------------------------
  # Nginx - Report Server
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: reconforge-nginx
    depends_on:
      - master
    ports:
      - "80:80"
    volumes:
      - master-output:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - reconforge-net
    deploy:
      resources:
        limits:
          memory: 256M

  # -------------------------------------------------------------------------
  # Prometheus - Metrics Collection
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: reconforge-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command: --config.file=/etc/prometheus/prometheus.yml
    networks:
      - reconforge-net
    deploy:
      resources:
        limits:
          memory: 512M

  # -------------------------------------------------------------------------
  # Grafana - Visualization Dashboard
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: reconforge-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: reconforge123
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - reconforge-net
    deploy:
      resources:
        limits:
          memory: 512M

# -------------------------------------------------------------------------
# Networks
# -------------------------------------------------------------------------
networks:
  reconforge-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# -------------------------------------------------------------------------
# Volumes
# -------------------------------------------------------------------------
volumes:
  redis-data:
  postgres-data:
  neo4j-data:
  neo4j-logs:
  master-output:
  master-logs:
  worker1-output:
  worker1-logs:
  worker2-output:
  worker2-logs:
  worker3-output:
  worker3-logs:
  prometheus-data:
  grafana-data:
